[project]
name = "conformal"
version = "0.1.0"
description = "Simple, fast, and decoupled uncertainty quantification for knowing when to trust your model's predictions."
readme = "README.md"
authors = [
    { name = "Rudi Kershaw", email = "alexander_kershaw@hotmail.co.uk" }
]
requires-python = ">=3.13"
dependencies = [
    "numpy>=2.0.0",
]
license = { text = "MIT" }
keywords = ["conformal-prediction", "uncertainty", "machine-learning"]

[project.urls]
Homepage = "https://github.com/rudikershaw/conformal"
Repository = "https://github.com/rudikershaw/conformal"
Issues = "https://github.com/rudikershaw/conformal/issues"

classifiers = [
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
]

[build-system]
requires = ["uv_build>=0.11.6,<0.12.0"]
build-backend = "uv_build"
